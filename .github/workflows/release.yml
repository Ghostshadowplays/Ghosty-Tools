name: Build and Release EXE

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller ghosty_tools.spec --clean --noconfirm

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist/GhostyTools.exe
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux DEB Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xclip xsel dpkg-dev
          python -m pip install --upgrade pip
          pip install --upgrade pyinstaller
          pip install -r requirements.txt

      - name: Build Linux Binary
        run: |
          pyinstaller ghosty_tools.spec --clean --noconfirm
          mv dist/GhostyTools dist/ghostytools

      - name: Create DEB structure
        run: |
          mkdir -p ghostytools_amd64/DEBIAN
          mkdir -p ghostytools_amd64/usr/bin
          cp dist/ghostytools ghostytools_amd64/usr/bin/ghostytools
          chmod +x ghostytools_amd64/usr/bin/ghostytools

          cat <<EOF > ghostytools_amd64/DEBIAN/control
          Package: ghostytools
          Version: 7.1
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Ghostshadow <ghosty@Ghostyware.com>
          Description: Professional All-in-One Cross-Platform Optimization & Security Suite
           Ghosty Tools is a high-performance, modular utility designed to secure and optimize Linux environments.
          EOF

      - name: Build DEB package
        run: |
          dpkg-deb --build ghostytools_amd64

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: ghostytools_amd64.deb
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
